modLoader="javafml"
loaderVersion="[65,)"
license="LGPL-3.0-or-later"
issueTrackerURL="https://github.com/Earthcomputer/clientcommands/issues"
clientSideOnly=true

[[mods]]
modId="clientcommandsforge"
version="${file.jarVersion}"
displayName="Client Commands (Forge port)"
authors="Earthcomputer (original mod); unofficial Forge port"
description='''Unofficial Forge port of Earthcomputer's clientcommands mod for Minecraft 26.2.
This build focuses on a working scaffold plus the /cenchant and /ccrackrng RNG-cracking commands;
most of the original mod's ~30 other commands are not yet ported.'''

[[dependencies.clientcommandsforge]]
    modId="forge"
    mandatory=true
    versionRange="[65,)"
    ordering="NONE"
    side="CLIENT"

[[dependencies.clientcommandsforge]]
    modId="minecraft"
    mandatory=true
    versionRange="[26.2,26.3)"
    ordering="NONE"
    side="CLIENT"
